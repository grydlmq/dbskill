<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">dbskill 单步路由图</title>
  <desc id="desc">真实任务先交给 dbs，dbs 每次只选择一个当前 Skill。任务完成后，根据用户是否明确下一步，回到 dbs、进入指定 Skill，或留在当前 Skill。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .eyebrow { font-size: 16px; font-weight: 700; letter-spacing: 1.8px; fill: #2563EB; }
      .title { font-size: 38px; font-weight: 700; fill: #0F172A; }
      .subtitle { font-size: 18px; font-weight: 400; fill: #64748B; }
      .index { font-size: 14px; font-weight: 700; fill: #94A3B8; }
      .index-inverse { font-size: 14px; font-weight: 700; fill: #BFDBFE; }
      .label { font-size: 21px; font-weight: 700; fill: #0F172A; }
      .label-inverse { font-size: 21px; font-weight: 700; fill: #FFFFFF; }
      .body { font-size: 16px; font-weight: 400; fill: #64748B; }
      .body-inverse { font-size: 16px; font-weight: 400; fill: #DBEAFE; }
      .condition { font-size: 15px; font-weight: 700; fill: #2563EB; }
      .node { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; }
      .node-accent { fill: #EFF6FF; stroke: #93C5FD; stroke-width: 1.5; }
      .node-strong { fill: #2563EB; stroke: #2563EB; stroke-width: 1.5; }
      .line { fill: none; stroke: #2563EB; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .rail { fill: none; stroke: #93C5FD; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .footer { font-size: 16px; font-weight: 600; fill: #334155; }
    </style>
  </defs>

  <rect width="1200" height="900" fill="#F8FAFC"/>
  <rect x="72" y="68" width="40" height="6" rx="3" fill="#2563EB"/>
  <text class="eyebrow" x="128" y="78">DBSKILL · 单步路由</text>
  <text class="title" x="72" y="137">每次只推进一个当前任务</text>
  <text class="subtitle" x="72" y="177">先完成本轮，再依据真实反馈决定下一步。</text>

  <rect class="node" x="72" y="252" width="220" height="146" rx="18"/>
  <text class="index" x="96" y="282">01 · INPUT</text>
  <text class="label" x="96" y="330">真实任务</text>
  <text class="body" x="96" y="362">材料、问题或新反馈</text>

  <path class="line" d="M292 325 H327"/>

  <rect class="node-strong" x="336" y="252" width="176" height="146" rx="18"/>
  <text class="index-inverse" x="360" y="282">02 · ROUTE</text>
  <text class="label-inverse" x="360" y="330">/dbs</text>
  <text class="body-inverse" x="360" y="362">读取上下文并选择</text>

  <path class="line" d="M512 325 H547"/>

  <rect class="node" x="556" y="252" width="236" height="146" rx="18"/>
  <text class="index" x="580" y="282">03 · DO</text>
  <text class="label" x="580" y="330">1 个当前 Skill</text>
  <text class="body" x="580" y="362">留在当前能力中完成任务</text>

  <path class="line" d="M792 325 H827"/>

  <rect class="node" x="836" y="252" width="292" height="146" rx="18"/>
  <text class="index" x="860" y="282">04 · OUTPUT</text>
  <text class="label" x="860" y="330">本轮结论</text>
  <text class="body" x="860" y="362">交付结果，并读取用户下一步</text>

  <text class="eyebrow" x="72" y="480">任务完成后的 3 种去向</text>
  <path class="rail" d="M982 398 V520 H232"/>
  <path class="rail" d="M232 520 H968"/>
  <path class="line" d="M232 520 V557"/>
  <path class="line" d="M600 520 V557"/>
  <path class="line" d="M968 520 V557"/>

  <rect class="node-accent" x="72" y="566" width="320" height="170" rx="18"/>
  <text class="condition" x="96" y="600">没有明确／仍不确定</text>
  <text class="label" x="96" y="648">回到 /dbs</text>
  <text class="body" x="96" y="682">带着本轮结论重新判断</text>
  <text class="body" x="96" y="708">无需重复描述材料</text>

  <rect class="node" x="440" y="566" width="320" height="170" rx="18"/>
  <text class="condition" x="464" y="600">已经指定其他 Skill</text>
  <text class="label" x="464" y="648">尊重用户选择</text>
  <text class="body" x="464" y="682">直接进入明确指定的能力</text>

  <rect class="node" x="808" y="566" width="320" height="170" rx="18"/>
  <text class="condition" x="832" y="600">当前任务仍在继续</text>
  <text class="label" x="832" y="648">留在当前 Skill</text>
  <text class="body" x="832" y="682">完成同一任务的自然后续</text>

  <rect x="72" y="798" width="1056" height="58" rx="14" fill="#E2E8F0"/>
  <circle cx="101" cy="827" r="7" fill="#2563EB"/>
  <text class="footer" x="120" y="833">原则：一次只选择 1 个当前 Skill；每轮结论成为下一次路由的输入。</text>
</svg>
